apiVersion: apps/v1
kind: Deployment
metadata:
  name: cce-insights-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cce-insights-ui
  template:
    metadata:
      labels:
        app: cce-insights-ui
    spec:
      containers:
        - name: cce-insights-ui
          image: ghcr.io/openphc/cce-insights-ui:demo
          ports:
            - containerPort: 3001
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cce-insights-ui
spec:
  selector:
    app: cce-insights-ui
  ports:
    - port: 3001
      targetPort: 3001
