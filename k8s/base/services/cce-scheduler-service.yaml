apiVersion: apps/v1
kind: Deployment
metadata:
  name: cce-scheduler-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cce-scheduler-service
  template:
    metadata:
      labels:
        app: cce-scheduler-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8083"
    spec:
      containers:
        - name: cce-scheduler-service
          image: ghcr.io/openphc/cce-scheduler-service:demo
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8083"
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_DB
            - name: DB_URL
              value: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC_SCHEDULER_TRIGGERS
              value: "cce.scheduler.triggers"
            - name: SCHEDULER_SCAN_INTERVAL
              value: "5000"
            - name: SCHEDULER_BATCH_SIZE
              value: "100"
            - name: SCHEDULER_LEASE_DURATION
              value: "30"
            - name: SCHEDULER_LEADER_RETRY
              value: "5000"
            - name: SCHEDULER_LOCK_KEY
              value: "100001"
            - name: SCHEDULER_TOTAL_PARTITIONS
              value: "1"
            - name: SCHEDULER_LOCK_ACQUIRE_DELAY
              value: "50"
            - name: SPRING_FLYWAY_TABLE
              value: "flyway_schema_history_scheduler"
            - name: SPRING_FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
            - name: SPRING_FLYWAY_BASELINE_VERSION
              value: "0"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus,metrics"
            - name: MANAGEMENT_METRICS_TAGS_APPLICATION
              value: "cce-scheduler-service"
            - name: BPL_JVM_THREAD_COUNT
              value: "50"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 768Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cce-scheduler-service
spec:
  selector:
    app: cce-scheduler-service
  ports:
    - port: 8083
      targetPort: 8083
