apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cce-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /insights
            pathType: Prefix
            backend:
              service:
                name: cce-insights-ui
                port:
                  number: 3001
          - path: /api/insights
            pathType: Prefix
            backend:
              service:
                name: cce-insights-service
                port:
                  number: 8084
          - path: /api/collector
            pathType: Prefix
            backend:
              service:
                name: cce-collector-service
                port:
                  number: 8080
          - path: /api/compliance
            pathType: Prefix
            backend:
              service:
                name: cce-compliance-service
                port:
                  number: 8080
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /kafka-ui
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
