# ExternalName service pointing to host-installed Kafka (KRaft mode).
# Pods connect to "kafka:<port>" — resolved to the host VM.
# Port is configured per environment in overlays (UAT: 9092, PROD: 9093).
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  type: ExternalName
  externalName: host.k3s.internal
