apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cce-uat

resources:
  - ../../base
  - namespace.yaml

configMapGenerator:
  - name: cce-config
    literals:
      - POSTGRES_DB=ccedb
      - POSTGRES_HOST=host.k3s.internal
      - POSTGRES_PORT=5433
      - KAFKA_BOOTSTRAP_SERVERS=host.k3s.internal:9093
      - KAFKA_UI_CLUSTER_NAME=cce-uat

secretGenerator:
  - name: cce-secrets
    literals:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=CHANGE_ME_UAT
      - CCE_COLLECTOR_AUTH_TOKEN=CHANGE_ME_UAT
      - GRAFANA_ADMIN_USER=admin
      - GRAFANA_ADMIN_PASSWORD=CHANGE_ME_UAT

generatorOptions:
  disableNameSuffixHash: true

# UAT-specific patches — lower resource limits
patches:
  - target:
      kind: Deployment
      name: cce-compliance-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
  - target:
      kind: Deployment
      name: cce-insights-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

commonLabels:
  environment: uat
