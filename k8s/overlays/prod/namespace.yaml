apiVersion: v1
kind: Namespace
metadata:
  name: cce-prod
  labels:
    environment: prod
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-resource-quota
  namespace: cce-prod
spec:
  # Sized for the vertically-scaled services PLUS the HPAs at max replicas (cce-hpas.yaml:
  # collector/gateway/emitter→3, compliance/intelligence/insights-svc/insights-ui→2,
  # scheduler→5) with rolling-update surge headroom. Bounded under the 24-core/96Gi VM so
  # cce-prod cannot starve UAT + native infra. (All-maxed footprint ≈ req 17c/23Gi, lim 58c/63Gi.)
  hard:
    requests.cpu: "20"
    requests.memory: 28Gi
    limits.cpu: "64"
    limits.memory: 80Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limit-range
  namespace: cce-prod
spec:
  limits:
    - default:
        memory: 1Gi
        cpu: "1"
      defaultRequest:
        memory: 256Mi
        cpu: 200m
      type: Container
