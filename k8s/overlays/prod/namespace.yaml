apiVersion: v1
kind: Namespace
metadata:
  name: cce-prod
  labels:
    environment: prod
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-resource-quota
  namespace: cce-prod
spec:
  hard:
    requests.cpu: "6"
    requests.memory: 8Gi
    limits.cpu: "10"
    limits.memory: 16Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limit-range
  namespace: cce-prod
spec:
  limits:
    - default:
        memory: 1Gi
        cpu: "1"
      defaultRequest:
        memory: 256Mi
        cpu: 200m
      type: Container
